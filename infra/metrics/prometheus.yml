global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/stub_status'

  - job_name: 'apache'
    static_configs:
      - targets: ['apache-exporter:9117']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
